    <script>
        function toggleComposer() {
            const composer = document.getElementById('postComposer');
            if (composer.classList.contains('translate-y-full')) {
                composer.classList.remove('translate-y-full');
                composer.classList.add('translate-y-0');
                document.getElementById('postTextarea').focus();
            } else {
                composer.classList.remove('translate-y-0');
                composer.classList.add('translate-y-full');
            }
        }

        function selectEmotion(emotionStr) {
            const emoji = emotionStr.split(' ')[0];
            const label = emotionStr.split(' ')[1];
            document.getElementById('vibe-emoji').innerText = emoji;
            document.getElementById('vibe-label').innerText = label;

            // Update selection UI (simplified for demo)
            const buttons = document.querySelectorAll('.flex.flex-wrap.gap-2 button');
            buttons.forEach(btn => {
                btn.classList.remove('border-primary', 'ring-1', 'ring-primary/20', 'bg-primary-container/10');
                if (btn.innerText.includes(label)) {
                    btn.classList.add('border-primary', 'ring-1', 'ring-primary/20', 'bg-primary-container/10');
                }
            });
        }

        function updateCharCount(textarea) {
            const count = textarea.value.length;
            document.getElementById('charCount').innerText = `${count} / 280`;
        }

        function toggleReaction(btn) {
            const icon = btn.querySelector('.material-symbols-outlined');
            const countSpan = btn.querySelector('span:not(.material-symbols-outlined)');
            if (!countSpan) return;
            const currentText = countSpan.innerText;
            const match = currentText.match(/\d+/);
            const currentCount = match ? parseInt(match[0]) : 0;

            const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");

            if (isFilled) {
                icon.style.fontVariationSettings = "'FILL' 0";
                btn.classList.remove('text-primary');
                btn.classList.add('text-on-surface-variant');
                countSpan.innerText = currentText.replace(/\d+/, currentCount - 1);
            } else {
                icon.style.fontVariationSettings = "'FILL' 1";
                btn.classList.remove('text-on-surface-variant');
                btn.classList.add('text-primary');
                countSpan.innerText = currentText.replace(/\d+/, currentCount + 1);
            }
        }

        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-md');
            } else {
                header.classList.remove('shadow-md');
            }
        });

        document.getElementById('postComposer').addEventListener('click', (e) => {
            if (e.target === document.getElementById('postComposer')) {
                toggleComposer();
            }
        });
    </script>
    <script src="https://www.google.com/jsapi?key=partner-pub-4933939632832598"></script>

    <script>
        // Keep track of our current active language and control object
        let currentLang = 'en';
        let transliterationControl = null;

        // 2. Wrap the initialization in a safety check to ensure the loader exists
        if (typeof google !== 'undefined' && google.load) {
            google.load("elements", "1", {
                packages: "transliteration"
            });
            google.setOnLoadCallback(onLoad);
        } else {
            console.error("Failed to load Google JSAPI framework.");
        }

        function onLoad() {
            // Verify the nested package initialized properly before creating instances
            if (!google.elements || !google.elements.transliteration) {
                console.error("Transliteration library failed to build inside google.elements pipeline.");
                return;
            }

            const options = {
                sourceLanguage: google.elements.transliteration.LanguageCode.ENGLISH,
                destinationLanguage: [google.elements.transliteration.LanguageCode.HINDI, google.elements.transliteration.LanguageCode.GUJARATI],
                shortcutKey: { 'alt': true },
                transliterationEnabled: true
            };

            // Initialize control and bind it to your textarea ID
            transliterationControl = new google.elements.transliteration.TransliterationControl(options);
            transliterationControl.makeTransliteratable(['postTextarea']);

            // Start with English disabled (native keyboard typing)
            transliterationControl.disableTransliteration();
        }

        function setLanguage(lang) {
            currentLang = lang;
            const textarea = document.getElementById('postTextarea');
            if (!textarea) return;

            // Update button visual styles safely
            ['en', 'hi', 'gu'].forEach(l => {
                const btn = document.getElementById(`lang-${l}`);
                if (btn) {
                    if (l === lang) {
                        btn.className = "px-3 py-1 rounded-full text-label-sm bg-primary text-on-primary transition-all duration-300";
                    } else {
                        btn.className = "px-3 py-1 rounded-full text-label-sm text-on-surface-variant hover:bg-surface-variant/50 transition-all duration-300";
                    }
                }
            });

            // Toggle typing behavior based on language choice
            if (!transliterationControl) return;

            if (lang === 'en') {
                transliterationControl.disableTransliteration();
                textarea.placeholder = "Type your thoughts here... no judgment, just space.";
                textarea.setAttribute('lang', 'en');
            } else if (lang === 'hi') {
                transliterationControl.enableTransliteration();
                transliterationControl.setLanguagePair(
                    google.elements.transliteration.LanguageCode.ENGLISH,
                    google.elements.transliteration.LanguageCode.HINDI
                );
                textarea.placeholder = "अपने विचार यहाँ टाइप करें... कोई निर्णय नहीं, बस जगह।";
                textarea.setAttribute('lang', 'hi');
            } else if (lang === 'gu') {
                transliterationControl.enableTransliteration();
                transliterationControl.setLanguagePair(
                    google.elements.transliteration.LanguageCode.ENGLISH,
                    google.elements.transliteration.LanguageCode.GUJARATI
                );
                textarea.placeholder = "તમારા વિચારો અહીં ટાઇપ કરો... કોઈ ન્યાય નહીં, માત્ર જગ્યા.";
                textarea.setAttribute('lang', 'gu');
            }

            // Refocus on textarea for a fluid user experience
            textarea.focus();
        }
    </script>
