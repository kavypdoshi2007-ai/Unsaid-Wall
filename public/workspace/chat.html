<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Workspace - Chat Channel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col justify-between font-sans">

    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <h1 class="text-lg font-bold text-gray-800">Secure Live Support Session</h1>
        </div>
        <button onclick="window.location.href='/dashboard.html'" class="text-sm font-medium text-gray-500 hover:text-gray-700 transition">
            &larr; Exit Workspace
        </button>
    </header>

    <main id="chatContainer" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50 max-w-4xl w-full mx-auto">
        <div id="chatLoader" class="flex items-center justify-center h-full text-gray-400 text-sm space-x-2">
            <svg class="animate-spin h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Synchronizing secure message logs...</span>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 px-6 py-4 max-w-4xl w-full mx-auto rounded-t-xl shadow-lg">
        <div class="flex items-center space-x-3">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message here..." 
                class="flex-1 bg-gray-100 border border-transparent focus:border-emerald-500 focus:bg-white text-gray-800 text-sm rounded-xl px-4 py-3 outline-none transition"
                disabled
            />
            <button 
                id="sendBtn" 
                class="bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-300 text-white font-medium text-sm px-5 py-3 rounded-xl transition shadow-md shadow-emerald-600/10"
                disabled
            >
                Send
            </button>
        </div>
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
